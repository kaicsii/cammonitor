<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>台東 Monitor</title>
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans+TC:400,700&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
        }

        /* 讓 16:9 舞台在視窗中置中,多餘處留黑邊 */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 整面監控牆:永遠維持 16:9,並塞進視窗 */
        #stage {
            width: min(100vw, calc(100vh * 16 / 9));
            aspect-ratio: 16 / 9;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 1px;
            background: #6b0000;   /* 格線顏色 */
        }

        /* 每一格:4×4 均分後自動就是 16:9 */
        .cell {
            position: relative;
            background: #000;
            overflow: hidden;
        }

        .cell iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        .show-noise {
            background-image: url(noise1.gif);
            background-repeat: repeat;
        }

        /* 編號徽章(只有含 data-num 的格子才顯示) */
        .cell[data-num]::before {
            content: attr(data-num);
            position: absolute;
            left: 8px;
            top: 8px;
            width: 28px;
            height: 28px;
            border-radius: 14px;
            background: var(--badge-bg, #E95242);
            color: var(--badge-fg, #fff);
            text-align: center;
            font: bold 15px/28px 'Cascadia Code', Consolas, 'Courier New', monospace;
            z-index: 9;
        }

        /* 地點名稱(只有含 data-loc 的格子才顯示) */
        .cell[data-loc]::after {
            content: attr(data-loc);
            position: absolute;
            left: 42px;
            top: 8px;
            height: 28px;
            color: #fff;
            line-height: 28px;
            letter-spacing: 1px;
            white-space: nowrap;
            pointer-events: none;
            text-shadow: -1px 0 #000, 0 1px #000, 1px 0 #000, 0 -1px #000;
            font: normal 15px/28px 'Noto Sans TC', 'microsoft jhenghei', Roboto, sans-serif;
            z-index: 9;
        }

        /* 隱藏編號時:徽章不顯示,地點名稱靠左對齊 */
        #stage.hide-num .cell[data-num]::before {
            display: none;
        }
        #stage.hide-num .cell[data-loc]::after {
            left: 8px;
        }
        #stage.hide-num .cell.main[data-loc]::after {
            left: 12px;
        }

        /* 主畫面徽章與標題放大 */
        .cell.main[data-num]::before {
            width: 34px;
            height: 34px;
            border-radius: 17px;
            font-size: 18px;
            line-height: 34px;
        }
        .cell.main[data-loc]::after {
            left: 50px;
            height: 34px;
            line-height: 34px;
            font-size: 20px;
            font-weight: 700;
        }

        /* 衛星雲圖:letterbox 不裁切 */
        .cell.sat img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            display: block;
        }

        /* 時鐘 / 標題等資訊格 */
        .cell.info {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'Noto Sans TC', 'microsoft jhenghei', Roboto, sans-serif;
            text-align: center;
        }
        .cell.clock .time {
            font: bold 6vh/1.1 'Cascadia Code', Consolas, monospace;
            letter-spacing: 2px;
        }
        .cell.clock .date {
            margin-top: 4px;
            font-size: 2.4vh;
            color: #bbb;
            letter-spacing: 2px;
        }
        .cell.title {
            background: #111;
            font-weight: 700;
            font-size: 3.4vh;
            line-height: 1.3;
            letter-spacing: 2px;
        }
        .cell.title .sub {
            margin-top: 6px;
            font-size: 1.9vh;
            font-weight: 400;
            color: #E95242;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="stage"></div>
    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
