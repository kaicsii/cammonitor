<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>台北 Monitor</title>
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
        }

        /* 16:9 舞台：置中並依視窗大小自動縮放（letterbox），不論視窗比例都維持 16:9 */
        .stage {
            position: absolute;
            inset: 0;
            margin: auto;
            width: min(100vw, calc(100vh * 16 / 9));
            aspect-ratio: 16 / 9;

            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            grid-template-areas:
                "main main main s1"
                "main main main s2"
                "main main main s3"
                "s4   s5   sat  sat";
            gap: 2px;
            background: #900;              /* 格線顏色 */
        }

        /* 每一格（單格 = 舞台的 1/4 寬 × 1/4 高 = 16:9；主畫面 3×3 同樣是 16:9） */
        .cell {
            position: relative;
            background: #000;
            overflow: hidden;
        }

        .cell--main { grid-area: main; }
        .cell--s1   { grid-area: s1; }
        .cell--s2   { grid-area: s2; }
        .cell--s3   { grid-area: s3; }
        .cell--s4   { grid-area: s4; }
        .cell--s5   { grid-area: s5; }
        .cell--sat  { grid-area: sat; }

        .cell iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        /* 未接上影像時的雪花背景 */
        .show-noise {
            background-image: url(noise1.gif);
            background-repeat: repeat;
        }

        /* 左上角編號徽章 */
        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: yellow;
            color: #000;
            text-align: center;
            font: bold 18px/34px 'Cascadia Code', Consolas, 'Courier New', monospace;
            z-index: 9;
        }

        /* 地點名稱 */
        .loc {
            position: absolute;
            top: 11px;
            left: 54px;
            color: #fff;
            letter-spacing: 1px;
            text-shadow: -1px 0 #000, 0 1px #000, 1px 0 #000, 0 -1px #000;
            font: normal 16px/34px 'Noto Sans TC', 'Microsoft JhengHei', Roboto, sans-serif;
            z-index: 9;
        }

        /* 主畫面的徽章與名稱放大一點 */
        .cell--main .badge {
            width: 44px;
            height: 44px;
            font-size: 22px;
            line-height: 44px;
        }
        .cell--main .loc {
            left: 66px;
            font-size: 21px;
            line-height: 44px;
        }

        /* 衛星雲圖保留區（實際影像由 OBS 疊上，這裡只標示位置） */
        .cell--sat {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d0d0d;
            border: 2px dashed #555;
        }
        .sat-label {
            color: #9a9a9a;
            text-align: center;
            font: normal 15px/1.5 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
        }
        .sat-label span {
            display: block;
            margin-top: 4px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
