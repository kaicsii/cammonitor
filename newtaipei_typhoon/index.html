<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>新北市即時影像 颱風動態監測</title>
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans+TC&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
        }

        /* 置中並維持 16:9，畫布比例不符時自動加黑邊（letterbox / pillarbox），確保各格不變形 */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #wall {
            position: relative;
            width: min(100vw, 177.78vh);   /* 16/9  */
            height: min(100vh, 56.25vw);   /* 9/16  */
            background: #000;
            /* 固定 3 欄 x 3 列（每格 = 畫布 1/3 寬 x 1/3 高 = 16:9）。
               實際的區塊配置(grid-template-areas)由 main.js 依可用攝影機數量動態套用。 */
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
        }

        .col {
            position: relative;
            background: #000;
            overflow: hidden;
        }

        .col iframe {
            width: 100%;
            height: 100%;
            display: block;
            border: 0;
        }

        /* 地點名稱（左上角），主畫面自動吃到 main 區 */
        .col:after {
            display: block;
            content: attr(data-loc);
            position: absolute;
            left: 16px;
            top: 12px;
            color: #fff;
            letter-spacing: 1px;
            text-shadow: -1px 0 #000, 0 1px #000, 1px 0 #000, 0 -1px #000;
            font: normal 17px/40px 'Noto Sans TC', 'microsoft jhenghei', Roboto, sans-serif;
            pointer-events: none;
            z-index: 9;
        }

        /* 圓形編號徽章：維持隱藏（要恢復改回 display:block） */
        .col:before {
            display: none;
        }

        .show-noise {
            background-image: url(noise1.gif);
            background-repeat: repeat;
        }

        /* 衛星雲圖：OBS 疊圖定位區（透明底 + 對齊虛線框） */
        .sat {
            grid-area: sat;
            position: relative;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: transparent;
            border: 2px dashed rgba(255, 255, 255, 0.35);
            color: rgba(255, 255, 255, 0.45);
            font: normal 18px/1.6 'Noto Sans TC', 'microsoft jhenghei', sans-serif;
            pointer-events: none;
            user-select: none;
        }

        .sat small {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div id="wall"></div>
    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
